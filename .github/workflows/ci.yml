name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    uses: ./.github/workflows/_quality.yml
    with:
      node_version: '22'

  browser-test:
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Core browser tests
        run: pnpm --filter @agentix-e/anomaly-detector-core test:browser -- --project=${{ matrix.browser }}
      - name: Web adapter browser tests
        run: pnpm --filter @agentix-e/anomaly-detector-web test:browser -- --project=${{ matrix.browser }}

  deploy-pages:
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: [quality, browser-test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build

      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: docs/coverage
        continue-on-error: true

      - name: Prepare GitHub Pages
        run: |
          mkdir -p docs/pages
          cat > docs/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>@agentix-e/anomaly-detector</title>
          <style>body{font-family:system-ui,sans-serif;max-width:800px;margin:2rem auto;padding:0 1rem;line-height:1.6;color:#1a1a2e}h1{border-bottom:2px solid #2563eb;padding-bottom:.5rem}a{color:#2563eb}table{border-collapse:collapse;width:100%;margin:1rem 0}th,td{border:1px solid #e5e7eb;padding:.5rem;text-align:left}th{background:#f3f4f6}code{background:#f3f4f6;padding:.15rem .3rem;border-radius:3px;font-size:.9em}</style></head>
          <body><h1>@agentix-e/anomaly-detector</h1><p>Embedded time-series anomaly detection engine. Dual-runtime (Node.js + Browser).</p>
          <h2>Packages</h2><table><tr><th>Package</th><th>Runtime</th><th>Description</th></tr>
          <tr><td><code>@agentix-e/anomaly-detector-core</code></td><td>Node + Browser</td><td>Detection, forecasting, calibration</td></tr>
          <tr><td><code>@agentix-e/anomaly-detector-node</code></td><td>Node.js</td><td>TimesFM foundation-model forecasting</td></tr>
          <tr><td><code>@agentix-e/anomaly-detector-web</code></td><td>Browser</td><td>TimesFM Web forecasting</td></tr></table>
          <h2>Links</h2><ul><li><a href="https://github.com/AgentiX-E/anomaly-detector">GitHub</a></li><li><a href="coverage/">Coverage</a></li></ul></body></html>
          HTML
          echo "[deploy-pages] Landing page generated"

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry deploy
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Collect page URL
        id: deployment
        if: always()
        run: |
          if [ "${{ steps.deploy1.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deploy1.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.deploy2.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deploy2.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "Page deployment failed after retry" >&2
            exit 1
          fi
